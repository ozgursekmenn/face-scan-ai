<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0d0e15"/>
  <!-- Scanning Corners -->
  <path d="M 120 180 L 120 120 L 180 120" stroke="url(#glowGrad)" stroke-width="24" stroke-linecap="round" fill="none" />
  <path d="M 392 180 L 392 120 L 332 120" stroke="url(#glowGrad)" stroke-width="24" stroke-linecap="round" fill="none" />
  <path d="M 120 332 L 120 392 L 180 392" stroke="url(#glowGrad)" stroke-width="24" stroke-linecap="round" fill="none" />
  <path d="M 392 332 L 392 392 L 332 392" stroke="url(#glowGrad)" stroke-width="24" stroke-linecap="round" fill="none" />
  <!-- Heart and Face Scanner Symbol -->
  <path d="M 256 180 C 256 180 200 130 150 180 C 100 230 256 350 256 350 C 256 350 412 230 362 180 C 312 130 256 180 256 180 Z" fill="url(#glowGrad)" filter="url(#glow)" opacity="0.85" />
  <!-- Pulse Line -->
  <path d="M 100 256 L 180 256 L 210 200 L 240 312 L 270 230 L 300 280 L 330 256 L 412 256" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
